 }
 return [];

function loadLocal(){let d=localStorage.getItem('defensasDemoDB'); if(!d){localStorage.setItem('defensasDemoDB',JSON.stringify(seed)); return JSON.parse(JSON.stringify(seed));} return JSON.parse(d)}
function saveLocal(d){localStorage.setItem('defensasDemoDB',JSON.stringify(d))}
async function all(table){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).select('*').order('id',{ascending:true}); if(error) throw error; return data||[];} return loadLocal()[table]||[]; }
async function insert(table,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).insert(row).select().single(); if(error) throw error; return data;} const d=loadLocal(); const arr=d[table]||[]; const id=arr.length?Math.max(...arr.map(x=>Number(x.id)||0))+1:1; const rec={id,...row}; arr.push(rec); d[table]=arr; saveLocal(d); return rec; }

ginJurado(e){

   const jurados=await all('defensa_jurados');
   const asignado=jurados.some(j=>String(j.profesor_id)===String(p.id));
   if(!asignado){alert('No tiene defensas asignadas en este momento.');return}
   setUser({...p,tipo:'jurado',modulos:'jurado'});
   try{await update('profesores',p.id,{ultimo_acceso:new Date().toISOString(),intentos_fallidos:0});}catch(e){}
   await audit('login','jurado','Ingreso jurado '+p.cedula);
   location.href='jurado.html'
 }catch(err){console.error(err);alert('No se pudo conectar con Supabase o falta ejecutar el SQL de tablas/datos. Revise la consola y ejecute tablas.sql, politicas_rls.sql, datos_demo.sql y actualizacion_docentes_invitacion.sql.')}
}
async function iniciarInvitacion(){
 const params=new URLSearchParams(location.search);
 const tokenDoc=params.get('invite_docente');
 if(tokenDoc){ await iniciarInvitacionDocente(tokenDoc); return; }
 const token=params.get('invite'); if(!token) return;
 try{
   const invs=await all('invitaciones'); const inv=invs.find(x=>String(x.token)===String(token) && String(x.estado||'pendiente')!=='usado');
   const card=document.getElementById('authCard');
   if(!inv){ card.innerHTML='<h1>Invitación no válida</h1><p class="muted">El enlace de invitación no existe, ya fue usado o está inactivo.</p><a class="btn btn-primary btn-block" href="index.html">Volver al inicio</a>'; return; }
   card.innerHTML=`<img class="logo" src="${LOGO_URL}"><h1>Activar acceso</h1><p class="muted">Complete sus datos para ingresar al sistema.</p><form onsubmit="registrarInvitado(event,'${token}')"><div class="form-group"><label>Nombre</label><input id="invNombre" value="${inv.nombre||''}" required></div><div class="form-group"><label>Correo</label><input id="invCorreo" value="${inv.correo||''}" required></div><div class="form-group"><label>Contraseña</label><input id="invPassword" type="password" required></div><div class="note">Rol asignado: <strong>${inv.rol||'Consulta'}</strong></div><button class="btn btn-primary btn-block">Activar cuenta</button></form>`;
 }catch(e){console.error(e); alert('No se pudo validar la invitación. Revise que exista la tabla invitaciones.');}
}
async function registrarInvitado(e,token){
 e.preventDefault();
 const invs=await all('invitaciones'); const inv=invs.find(x=>String(x.token)===String(token)); if(!inv){alert('Invitación no válida');return;}
 const usuarios=await all('usuarios'); const existente=usuarios.find(u=>String(u.correo).toLowerCase()===getVal('invCorreo').toLowerCase());
 const row={nombre:getVal('invNombre'),correo:getVal('invCorreo'),password:getVal('invPassword'),rol:inv.rol||'Consulta',modulos:inv.modulos||'',estado:'activo'};
 if(existente){ await update('usuarios',existente.id,row); } else { await insert('usuarios',row); }
 await update('invitaciones',inv.id,{estado:'usado',fecha_uso:new Date().toISOString()});
 alert('Cuenta activada correctamente. Ahora puede ingresar.'); location.href='index.html';
}

async function iniciarInvitacionDocente(token){
 try{
   const invs=await all('invitaciones_docentes');
   const inv=invs.find(x=>String(x.token)===String(token) && !['usado','inactivo'].includes(String(x.estado||'pendiente')));
   const card=document.getElementById('authCard');
   if(!inv){ card.innerHTML='<h1>Invitación docente no válida</h1><p class="muted">El enlace no existe, ya fue usado o está inactivo.</p><a class="btn btn-primary btn-block" href="index.html">Volver al inicio</a>'; return; }
   card.innerHTML=`<img class="logo" src="${LOGO_URL}"><h1>Activar acceso docente</h1><p class="muted">Confirme sus datos para habilitar el acceso al módulo de defensa.</p><form onsubmit="registrarDocenteInvitado(event,'${token}')"><div class="grid grid-2"><div class="form-group"><label>Cédula</label><input id="docCedula" value="${inv.cedula||''}" required></div><div class="form-group"><label>Nombres</label><input id="docNombres" value="${inv.nombres||''}" required></div><div class="form-group"><label>Apellidos</label><input id="docApellidos" value="${inv.apellidos||''}" required></div><div class="form-group"><label>Correo</label><input id="docCorreo" value="${inv.correo||''}"></div><div class="form-group"><label>Teléfono</label><input id="docTelefono" value="${inv.telefono||''}"></div><div class="form-group"><label>Título</label><input id="docTituloe" value="${inv.tituloe||''}"></div></div><div class="note">Al activar su cuenta, podrá ingresar únicamente al módulo <strong>Mis defensas asignadas</strong> usando su número de cédula.</div><button class="btn btn-success btn-block">Activar acceso docente</button></form>`;
 }catch(e){console.error(e); alert('No se pudo validar la invitación docente. Ejecute actualizacion_docentes_invitacion.sql en Supabase.');}
}
async function registrarDocenteInvitado(e,token){
 e.preventDefault();
 const invs=await all('invitaciones_docentes'); const inv=invs.find(x=>String(x.token)===String(token)); if(!inv){alert('Invitación docente no válida');return;}
 const profesores=await all('profesores'); const existente=profesores.find(p=>String(p.cedula)===getVal('docCedula'));
 const row={cedula:getVal('docCedula'),nombres:getVal('docNombres'),apellidos:getVal('docApellidos'),correo:getVal('docCorreo'),telefono:getVal('docTelefono'),tituloe:getVal('docTituloe'),estado:'activo',estado_acceso:'activo',fecha_activacion:new Date().toISOString(),token_invitacion:token};
 if(existente){ await update('profesores',existente.id,row); } else { await insert('profesores',row); }
 await update('invitaciones_docentes',inv.id,{estado:'usado',fecha_uso:new Date().toISOString()});
 alert('Acceso docente activado correctamente. Ahora ingrese en la pestaña Jurado con su cédula.'); location.href='index.html';
}
iniciarInvitacion();
</script></body></html>
