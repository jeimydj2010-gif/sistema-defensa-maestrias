nd img{width:82px;height:82px;object-fit:contain;border-radius:10px;background:#fff;padding:4px}.brand h2{font-size:17px;margin:10px 0 3px}.brand span{font-size:12px;opacity:.86}.menu{padding:12px}.menu a{display:flex;gap:10px;align-items:center;color:#fff;text-decoration:none;padding:11px 13px;border-radius:10px;margin-bottom:6px;font-weight:600;font-size:14px}.menu a:hover,.menu a.active{background:rgba(0,206,124,.24)}.main{margin-left:280px;width:calc(100% - 280px);min-height:100vh}.topbar{background:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:3}.topbar h1{font-size:22px;margin:0;color:var(--verde-oscuro)}.content{padding:24px}.grid{display:grid;gap:18px}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:#fff;border:1px solid var(--borde);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.04)}.kpi{border-left:5px solid var(--verde)}.kpi .num{font-size:30px;font-weight:800;color:var(--verde-oscuro)}.kpi .label{color:var(--plomo);font-size:13px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}.table-wrap{overflow:auto;border:1px solid var(--borde);border-radius:14px;background:#fff}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:11px;border-bottom:1px solid #edf2f1;text-align:left;font-size:14px}th{background:#eef8f5;color:var(--verde-oscuro);font-size:13px}tr:hover{background:#fbfdfd}.badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800}.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#fff7ed;color:#c2410c}.badge.err{background:#fee2e2;color:#991b1b}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9;padding:20px}.modal-card{background:#fff;border-radius:18px;max-width:760px;width:100%;padding:20px;max-height:90vh;overflow:auto}.modal-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--borde);padding-bottom:10px;margin-bottom:14px}.modal-head h2{margin:0;color:var(--verde-oscuro);font-size:20px}.close{background:none;border:0;font-size:26px;cursor:pointer;color:var(--plomo)}.note{background:#fff7ed;border-left:5px solid var(--tomate);padding:12px;border-radius:10px;margin:12px 0}.print-area{background:#fff;padding:35px;border:1px solid #ddd}.acta-header{text-align:center;border-bottom:3px solid var(--verde-oscuro);padding-bottom:15px;margin-bottom:20px}.acta-header img{width:90px}.footer-small{font-size:12px;color:var(--plomo);margin-top:20px}.mobile-menu{display:none}@media(max-width:900px){.sidebar{transform:translateX(-100%);transition:.2s}.sidebar.open{transform:translateX(0)}.main{margin-left:0;width:100%}.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.mobile-menu{display:inline-flex}.topbar{gap:10px}.topbar h1{font-size:18px}}@media print{.sidebar,.topbar,.toolbar,.no-print{display:none!important}.main{margin:0;width:100%}.content{padding:0}.card{box-shadow:none;border:0}.print-area{border:0}.modal{position:static;background:#fff}.modal-card{max-width:none;box-shadow:none}}

</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>

const seed = {

 periodos:[{id:1,nombre:'Maestrias 2026 - Cohorte I',fecha_inicio:'2026-01-01',fecha_fin:'2026-12-31',estado:'activo'}],
 estudiantes:[{id:1,periodo_id:1,cedula:'1720000001',nombres:'Ana Gabriela',apellidos:'Perez Mora',correo:'ana.perez@cordillera.edu.ec',telefono:'0999999991',teams:'ana.perez@cordillera.edu.ec',programa:'Maestria en Gestion Educativa',cohorte:'I',estado:'activo'},{id:2,periodo_id:1,cedula:'1720000002',nombres:'Carlos Andres',apellidos:'Lopez Vera',correo:'carlos.lopez@cordillera.edu.ec',telefono:'0999999992',teams:'carlos.lopez@cordillera.edu.ec',programa:'Maestria en Administracion',cohorte:'I',estado:'activo'}],

};
function loadLocal(){let d=localStorage.getItem('defensasDemoDB'); if(!d){localStorage.setItem('defensasDemoDB',JSON.stringify(seed)); return JSON.parse(JSON.stringify(seed));} return JSON.parse(d)}
function saveLocal(d){localStorage.setItem('defensasDemoDB',JSON.stringify(d))}
async function all(table){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).select('*').order('id',{ascending:true}); if(error) throw error; return data||[];} return loadLocal()[table]||[]; }
async function insert(table,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).insert(row).select().single(); if(error) throw error; return data;} const d=loadLocal(); const arr=d[table]||[]; const id=arr.length?Math.max(...arr.map(x=>Number(x.id)||0))+1:1; const rec={id,...row}; arr.push(rec); d[table]=arr; saveLocal(d); return rec; }
async function update(table,id,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).update(row).eq('id',id).select().single(); if(error) throw error; return data;} const d=loadLocal(); d[table]=(d[table]||[]).map(x=>String(x.id)===String(id)?{...x,...row}:x); saveLocal(d); return row; }
async function removeRow(table,id){ if(supabaseClient){ const {error}=await supabaseClient.from(table).delete().eq('id',id); if(error) throw error; return true;} const d=loadLocal(); d[table]=(d[table]||[]).filter(x=>String(x.id)!==String(id)); saveLocal(d); return true; }
async function audit(accion,modulo,descripcion){ try{await insert('auditoria',{usuario_id:getUser()?.id||null,accion,modulo,descripcion,fecha:new Date().toISOString()});}catch(e){} }
function getUser(){return JSON.parse(sessionStorage.getItem('usuario')||'null')}
function setUser(u){sessionStorage.setItem('usuario',JSON.stringify(u))}
function logout(){sessionStorage.clear(); location.href='index.html'}
function requireAdmin(){ if(!getUser()){ location.href='index.html'; }}
function money(n){return Number(n||0).toFixed(2)}
function badge(text,type='ok'){return `<span class="badge ${type}">${text}</span>`}
function csvDownload(filename, rows){ const csv=rows.map(r=>r.map(v=>`"${String(v??'').replaceAll('"','""')}"`).join(',')).join('
'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})); a.download=filename; a.click(); }
async function calcularCierre(defensaId){ const c=(await all('calificaciones')).filter(x=>String(x.defensa_id)===String(defensaId)); if(c.length>=3){ const prom=c.reduce((s,x)=>s+Number(x.nota),0)/c.length; await update('defensas',defensaId,{estado:'finalizada',nota_final:prom,estado_final:prom>=NOTA_MINIMA_APROBACION?'aprobado':'reprobado'}); } }

</script></head><body class="auth-body"><div class="auth-card"><img class="logo" src="https://i.imgur.com/9aGsanI.jpeg"><h1>Sistema de Defensas de Maestrías</h1><p class="muted">Instituto Tecnológico Universitario Cordillera</p><div class="tabs"><button class="tab active" onclick="showTab('admin',this)">Administración</button><button class="tab" onclick="showTab('jurado',this)">Jurado</button></div><form id="admin" onsubmit="loginAdmin(event)"><div class="form-group"><label>Correo</label><input id="correo" value="admin@cordillera.edu.ec"></div><div class="form-group"><label>Contraseña</label><input id="password" type="password" value="admin123"></div><button class="btn btn-primary btn-block">Ingresar</button></form><form id="jurado" class="hidden" onsubmit="loginJurado(event)"><div class="form-group"><label>Cédula del docente</label><input id="cedulaJurado" value="1711111111"></div><button class="btn btn-success btn-block">Ingresar a defensas</button></form><p class="footer-small">Demo: admin@cordillera.edu.ec / admin123 | Jurado: 1711111111</p></div><script>function showTab(id,btn){document.querySelectorAll('form').forEach(f=>f.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active')}async function loginAdmin(e){e.preventDefault();const u=(await all('usuarios')).find(x=>x.correo===correo.value&&x.password===password.value&&x.estado==='activo');if(!u){alert('Credenciales incorrectas o usuario inactivo');return}setUser({...u,tipo:'admin'});await audit('login','auth','Ingreso administrador');location.href='dashboard.html'}async function loginJurado(e){e.preventDefault();const p=(await all('profesores')).find(x=>x.cedula===cedulaJurado.value&&x.estado==='activo');if(!p){alert('El docente no consta activo en la base');return}setUser({...p,tipo:'jurado'});await audit('login','jurado','Ingreso jurado '+p.cedula);location.href='jurado.html'}</script></body></html>
