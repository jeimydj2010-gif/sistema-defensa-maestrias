};
function loadLocal(){let d=localStorage.getItem('defensasDemoDB'); if(!d){localStorage.setItem('defensasDemoDB',JSON.stringify(seed)); return JSON.parse(JSON.stringify(seed));} return JSON.parse(d)}
function saveLocal(d){localStorage.setItem('defensasDemoDB',JSON.stringify(d))}
async function all(table){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).select('*').order('id',{ascending:true}); if(error) throw error; return data||[];} return loadLocal()[table]||[]; }
async function insert(table,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).insert(row).select().single(); if(error) throw error; return data;} const d=loadLocal(); const arr=d[table]||[]; const id=arr.length?Math.max(...arr.map(x=>Number(x.id)||0))+1:1; const rec={id,...row}; arr.push(rec); d[table]=arr; saveLocal(d); return rec; }
async function update(table,id,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).update(row).eq('id',id).select().single(); if(error) throw error; return data;} const d=loadLocal(); d[table]=(d[table]||[]).map(x=>String(x.id)===String(id)?{...x,...row}:x); saveLocal(d); return row; }
async function removeRow(table,id){ if(supabaseClient){ const {error}=await supabaseClient.from(table).delete().eq('id',id); if(error) throw error; return true;} const d=loadLocal(); d[table]=(d[table]||[]).filter(x=>String(x.id)!==String(id)); saveLocal(d); return true; }
async function audit(accion,modulo,descripcion){ try{await insert('auditoria',{usuario_id:getUser()?.id||null,accion,modulo,descripcion,fecha:new Date().toISOString()});}catch(e){} }
function getUser(){return JSON.parse(sessionStorage.getItem('usuario')||'null')}
function setUser(u){sessionStorage.setItem('usuario',JSON.stringify(u))}
function logout(){sessionStorage.clear(); location.href='index.html'}
function requireAdmin(){ if(!getUser()){ location.href='index.html'; }}
function money(n){return Number(n||0).toFixed(2)}
function badge(text,type='ok'){return `<span class="badge ${type}">${text}</span>`}
function csvDownload(filename, rows){ const csv=rows.map(r=>r.map(v=>`"${String(v??'').replaceAll('"','""')}"`).join(',')).join('
'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})); a.download=filename; a.click(); }
async function calcularCierre(defensaId){ const c=(await all('calificaciones')).filter(x=>String(x.defensa_id)===String(defensaId)); if(c.length>=3){ const prom=c.reduce((s,x)=>s+Number(x.nota),0)/c.length; await update('defensas',defensaId,{estado:'finalizada',nota_final:prom,estado_final:prom>=NOTA_MINIMA_APROBACION?'aprobado':'reprobado'}); } }

function pageShell(title){document.write(`

</nav></aside><main class="main"><div class="topbar"><button class="btn btn-secondary mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><h1>${title}</h1><div class="muted">${DEMO?'Modo demo local':'Supabase conectado'}</div></div><div class="content" id="app"></div></main></div>`)}
function modal(title,html){document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="modal"><div class="modal-card"><div class="modal-head"><h2>${title}</h2><button class="close" onclick="closeModal()">×</button></div>${html}</div></div>`)}
function closeModal(){document.getElementById('modal')?.remove()}
function getVal(id){return document.getElementById(id).value.trim()}
async function renderCrud({table,title,fields,columns}){ requireAdmin(); const app=document.getElementById('app'); const data=await all(table); app.innerHTML=`<div class="card"><div class="toolbar"><button class="btn btn-primary" onclick="openCrud('${table}')">➕ Nuevo</button><button class="btn btn-outline" onclick="exportTable('${table}')">📥 Exportar CSV</button><input id="buscar" placeholder="Buscar..." oninput="filterTable()"></div><div class="table-wrap"><table id="mainTable"><thead><tr>${columns.map(c=>`<th>${c.label}</th>`).join('')}<th>Acciones</th></tr></thead><tbody>${data.map(r=>`<tr>${columns.map(c=>`<td>${c.render?c.render(r):r[c.key]??''}</td>`).join('')}<td><button class="btn btn-secondary" onclick="openCrud('${table}',${r.id})">✏️</button> <button class="btn btn-danger" onclick="del('${table}',${r.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div></div>`; window.__crud={table,title,fields,columns,data}; }
window.openCrud=async function(table,id=null){ const cfg=window.__crud; const row=id?cfg.data.find(x=>String(x.id)===String(id)):{}; const html=`<form onsubmit="saveCrud(event,'${table}',${id||'null'})"><div class="grid grid-2">${cfg.fields.map(f=>`<div class="form-group"><label>${f.label}</label>${f.type==='textarea'?`<textarea id="f_${f.key}">${row[f.key]||''}</textarea>`:`<input id="f_${f.key}" type="${f.type||'text'}" value="${row[f.key]||''}">`}</div>`).join('')}</div><button class="btn btn-primary">Guardar</button></form>`; modal(id?'Editar registro':'Nuevo registro',html); }
window.saveCrud=async function(e,table,id){ e.preventDefault(); const cfg=window.__crud; const row={}; cfg.fields.forEach(f=>row[f.key]=getVal('f_'+f.key)); if(id){await update(table,id,row); await audit('editar',table,'Edito registro '+id)}else{await insert(table,row); await audit('crear',table,'Creo registro')} location.reload(); }
window.del=async function(table,id){ if(confirm('Desea eliminar este registro?')){ await removeRow(table,id); await audit('eliminar',table,'Elimino registro '+id); location.reload(); }}
window.exportTable=async function(table){ const data=await all(table); const keys=Object.keys(data[0]||{}); csvDownload(table+'.csv',[keys,...data.map(r=>keys.map(k=>r[k]))]); }
window.filterTable=function(){ const q=getVal('buscar').toLowerCase(); document.querySelectorAll('#mainTable tbody tr').forEach(tr=>tr.style.display=tr.innerText.toLowerCase().includes(q)?'':'none'); }
async function lookup(){ const [est,prof,tem,def,jur,cal]=await Promise.all(['estudiantes','profesores','temas','defensas','defensa_jurados','calificaciones'].map(all)); return {est,prof,tem,def,jur,cal}; }
