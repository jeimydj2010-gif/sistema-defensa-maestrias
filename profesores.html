function loadLocal(){let d=localStorage.getItem('defensasDemoDB'); if(!d){localStorage.setItem('defensasDemoDB',JSON.stringify(seed)); return JSON.parse(JSON.stringify(seed));} return JSON.parse(d)}
function saveLocal(d){localStorage.setItem('defensasDemoDB',JSON.stringify(d))}
async function all(table){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).select('*').order('id',{ascending:true}); if(error) throw error; return data||[];} return loadLocal()[table]||[]; }
async function insert(table,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).insert(row).select().single(); if(error) throw error; return data;} const d=loadLocal(); const arr=d[table]||[]; const id=arr.length?Math.max(...arr.map(x=>Number(x.id)||0))+1:1; const rec={id,...row}; arr.push(rec); d[table]=arr; saveLocal(d); return rec; }

async function renderCrud({table,title,fields,columns}){ if(!requireAdmin()) return; const app=document.getElementById('app'); try{ const data=await all(table); const importBtns=(['estudiantes','profesores','maestrias','temas'].includes(table))?`<button class="btn btn-success" onclick="openImportModal('${table}')">📤 Importar XLS/XLSX</button><button class="btn btn-outline" onclick="descargarModelo('${table}')">📄 Descargar modelo</button>`:''; app.innerHTML=`<div class="card"><div class="toolbar"><button class="btn btn-primary" onclick="openCrud('${table}')">➕ Nuevo</button>${importBtns}<button class="btn btn-outline" onclick="exportTable('${table}')">📥 Exportar CSV</button><input id="buscar" placeholder="Buscar..." oninput="filterTable()"></div><div class="table-wrap"><table id="mainTable" class="table-compact"><thead><tr>${columns.map(c=>`<th>${c.label}</th>`).join('')}<th>Estado</th><th>Acciones</th></tr></thead><tbody>${data.length?data.map(r=>`<tr>${columns.map(c=>`<td class="${['correo','correo_institucional','correo_personal','carrera','programa','nombre','nombres','apellidos','tema'].includes(c.key)?'cell-limit':['cedula','telefono','celular','whatsapp','nivel','tipo','periodo','estado_acceso'].includes(c.key)?'cell-short cell-center':''}">${c.render?c.render(r):r[c.key]??''}</td>`).join('')}<td>${badge(r.estado||'activo',(r.estado||'activo')==='activo'?'ok':'warn')}</td><td><button class="btn btn-secondary" onclick="openCrud('${table}',${r.id})">✏️ Editar</button> <button class="btn btn-danger" onclick="del('${table}',${r.id})">🗑️ Eliminar</button></td></tr>`).join(''):`<tr><td colspan="${columns.length+2}"><div class="empty-state">No existen registros todavía. Use el botón Nuevo o Importar XLS/XLSX.</div></td></tr>`}</tbody></table></div></div>`; window.__crud={table,title,fields,columns,data}; }catch(e){ console.error(e); app.innerHTML=`<div class="card"><h2>${title}</h2><div class="note"><strong>No se pudo cargar el módulo ${title}.</strong><br>${e.message||e}<br><br>Verifique que la tabla exista en Supabase y que haya ejecutado el SQL de actualización correspondiente.</div><div class="toolbar"><button class="btn btn-primary" onclick="location.reload()">🔄 Reintentar</button></div></div>`; }}
window.openCrud=async function(table,id=null){ const cfg=window.__crud; const row=id?cfg.data.find(x=>String(x.id)===String(id)):{}; const html=`<form onsubmit="saveCrud(event,'${table}',${id||'null'})"><div class="grid grid-2">${cfg.fields.map(f=>`<div class="form-group"><label>${f.label}</label>${f.type==='textarea'?`<textarea id="f_${f.key}">${row[f.key]||''}</textarea>`:`<input id="f_${f.key}" type="${f.type||'text'}" value="${row[f.key]||''}">`}</div>`).join('')}</div><button class="btn btn-primary">Guardar</button></form>`; modal(id?'Editar registro':'Nuevo registro',html); }
window.saveCrud=async function(e,table,id){ e.preventDefault(); const cfg=window.__crud; const row={}; cfg.fields.forEach(f=>row[f.key]=getVal('f_'+f.key)); if(id){await update(table,id,row); await audit('editar',table,'Edito registro '+id)}else{await insert(table,row); await audit('crear',table,'Creo registro')} location.reload(); }
window.del=async function(table,id){ if(confirm('Desea eliminar este registro?')){ await removeRow(table,id); await audit('eliminar',table,'Elimino registro '+id); location.reload(); }}
window.exportTable=async function(table){ const data=await all(table); const keys=Object.keys(data[0]||{}); csvDownload(table+'.csv',[keys,...data.map(r=>keys.map(k=>r[k]))]); }
window.filterTable=function(){ const q=getVal('buscar').toLowerCase(); document.querySelectorAll('#mainTable tbody tr').forEach(tr=>tr.style.display=tr.innerText.toLowerCase().includes(q)?'':'none'); }

const MODELOS_IMPORTACION={
 estudiantes:['CEDULA','NOMBRE','CORREO_INSTITUCIONAL','CORREO_PERSONAL','CELULAR','WHATSAPP','CARRERA','NIVEL','TIPO','PERIODO'],
 profesores:['cedula','nombres','apellidos','correo','telefono','tituloe','estado','estado_acceso'],
 maestrias:['nombre','codigo','estado'],
 temas:['CEDULA_ESTUDIANTE','NOMBRE_ESTUDIANTE','TEMA','LINEA','CEDULA_TUTOR','PERIODO_ID','ESTADO']
};
function getImportValue(r,key){
 const variantes=[key,key.toUpperCase(),key.toLowerCase(),key.replaceAll('_',' '),key.toUpperCase().replaceAll('_',' ')];
 for(const k of variantes){ if(r[k]!==undefined && r[k]!==null) return String(r[k]).trim(); }
 return '';
}
function normalizarFilaImportacion(table,r){
 if(table==='estudiantes'){
   const cedula=getImportValue(r,'CEDULA');
   const nombre=getImportValue(r,'NOMBRE');
   const correoInst=getImportValue(r,'CORREO_INSTITUCIONAL');
   const correoPersonal=getImportValue(r,'CORREO_PERSONAL');
   const celular=getImportValue(r,'CELULAR');
   const whatsapp=getImportValue(r,'WHATSAPP');
   const carrera=getImportValue(r,'CARRERA');
   const nivel=getImportValue(r,'NIVEL');
   const tipo=getImportValue(r,'TIPO');
   const periodo=getImportValue(r,'PERIODO');
   return {cedula,nombre,nombres:nombre,apellidos:'',correo:correoInst,correo_institucional:correoInst,correo_personal:correoPersonal,celular,whatsapp,telefono:whatsapp||celular,carrera,nivel,tipo,periodo,programa:carrera,cohorte:nivel,estado:'activo'};
 }
 if(table==='profesores'){
   return {cedula:getImportValue(r,'cedula'),nombres:getImportValue(r,'nombres'),apellidos:getImportValue(r,'apellidos'),correo:getImportValue(r,'correo'),telefono:getImportValue(r,'telefono'),tituloe:getImportValue(r,'tituloe'),estado:getImportValue(r,'estado')||'activo',estado_acceso:getImportValue(r,'estado_acceso')||'activo'};
 }
 if(table==='maestrias'){
   return {nombre:getImportValue(r,'nombre'),codigo:getImportValue(r,'codigo'),estado:getImportValue(r,'estado')||'activo'};
 }
 if(table==='temas'){
   return {
     cedula_estudiante:getImportValue(r,'CEDULA_ESTUDIANTE') || getImportValue(r,'CEDULA') || getImportValue(r,'cedula_estudiante'),
     nombre_estudiante:getImportValue(r,'NOMBRE_ESTUDIANTE') || getImportValue(r,'NOMBRE') || getImportValue(r,'nombre_estudiante'),
     tema:getImportValue(r,'TEMA') || getImportValue(r,'tema'),
     linea:getImportValue(r,'LINEA') || getImportValue(r,'linea') || getImportValue(r,'LINEA_INVESTIGACION'),
     cedula_tutor:getImportValue(r,'CEDULA_TUTOR') || getImportValue(r,'cedula_tutor'),
     periodo_id:getImportValue(r,'PERIODO_ID') || getImportValue(r,'periodo_id'),
     estudiante_id:getImportValue(r,'ESTUDIANTE_ID') || getImportValue(r,'estudiante_id'),
     tutor_id:getImportValue(r,'TUTOR_ID') || getImportValue(r,'tutor_id'),
     estado:getImportValue(r,'ESTADO') || getImportValue(r,'estado') || 'registrado'
   };
 }
 return r;
}

function importKeyForTable(table,row){
  if(table==='estudiantes') return row.cedula ? {field:'cedula', value:String(row.cedula).trim()} : null;
  if(table==='profesores') return row.cedula ? {field:'cedula', value:String(row.cedula).trim()} : null;
  if(table==='maestrias'){
    if(row.codigo) return {field:'codigo', value:String(row.codigo).trim()};
    if(row.nombre) return {field:'nombre', value:String(row.nombre).trim()};
  }
  if(table==='temas'){
    if(row.tema) return {field:'tema', value:String(row.tema).trim()};
  }
  return null;
}
function isEmptyImportValue(v){
  return v===undefined || v===null || String(v).trim()==='';
}

async function buscarIdPorCampo(table,field,value){
  if(isEmptyImportValue(value)) return null;
  if(supabaseClient){
    const {data,error}=await supabaseClient.from(table).select('*').eq(field,String(value).trim()).limit(1);
    if(error) throw error;
    return data && data.length ? data[0] : null;
  }
  const d=loadLocal();
  return (d[table]||[]).find(x=>String(x[field]||'').trim()===String(value).trim()) || null;
}
async function prepararFilaImportacion(table,row){
  if(table!=='temas') return row;
  const salida={...row};

  if(!salida.estudiante_id && salida.cedula_estudiante){
    const est = await buscarIdPorCampo('estudiantes','cedula',salida.cedula_estudiante);
    if(!est) throw new Error('No existe estudiante con cédula '+salida.cedula_estudiante+'. Primero debe importarlo en Estudiantes.');
    salida.estudiante_id = est.id;
    salida.nombre_estudiante = est.nombre || ((est.nombres||'')+' '+(est.apellidos||'')).trim();
  }

  if(!salida.tutor_id && salida.cedula_tutor){
    const tutor = await buscarIdPorCampo('profesores','cedula',salida.cedula_tutor);
    if(tutor) salida.tutor_id = tutor.id;
  }

  delete salida.cedula_estudiante;
  delete salida.nombre_estudiante;
  delete salida.cedula_tutor;

  if(isEmptyImportValue(salida.periodo_id)) delete salida.periodo_id;
  if(isEmptyImportValue(salida.tutor_id)) delete salida.tutor_id;

  return salida;
}

async function findExistingImportRow(table,row){
  if(table==='temas' && row.estudiante_id && row.tema){
    if(supabaseClient){
      const {data,error}=await supabaseClient.from(table).select('*').eq('estudiante_id',row.estudiante_id).eq('tema',row.tema).limit(1);
      if(error) throw error;
      return data && data.length ? data[0] : null;
    }
    const d=loadLocal();
    return (d[table]||[]).find(x=>String(x.estudiante_id||'')===String(row.estudiante_id) && String(x.tema||'').trim()===String(row.tema||'').trim()) || null;
  }
  const key = importKeyForTable(table,row);
  if(!key) return null;
  if(supabaseClient){
    const {data,error}=await supabaseClient.from(table).select('*').eq(key.field,key.value).limit(1);
    if(error) throw error;
    return data && data.length ? data[0] : null;
  }
  const d=loadLocal();
  return (d[table]||[]).find(x=>String(x[key.field]||'').trim()===String(key.value).trim()) || null;
}
async function upsertImportRow(table,row){
  const existing = await findExistingImportRow(table,row);
  if(existing && existing.id){
    const patch = {};
    Object.keys(row).forEach(k=>{
      const incoming = row[k];
      if(!isEmptyImportValue(incoming) && isEmptyImportValue(existing[k])){
        patch[k]=incoming;
      }
    });
    if(Object.keys(patch).length){
      await update(table, existing.id, patch);
      return {status:'actualizado', id:existing.id, campos:Object.keys(patch).length};
    }
    return {status:'sin_cambios', id:existing.id, campos:0};
  }
  await insert(table,row);
  return {status:'nuevo', id:null, campos:Object.keys(row).length};
}

function descargarModelo(table){ const headers=MODELOS_IMPORTACION[table]||[]; let ejemplo=[]; if(table==='estudiantes') ejemplo=['1720000001','NOMBRE COMPLETO DEL ESTUDIANTE','estudiante@cordillera.edu.ec','personal@gmail.com','0999999999','0999999999','MAESTRIA TECNOLOGICA EN DESARROLLO E INNOVACION DIGITAL EN LOS NEGOCIOS','I','NUEVO','2026-2026']; else if(table==='profesores') ejemplo=['1711111111','NOMBRES','APELLIDOS','docente@cordillera.edu.ec','0999999999','Mgtr.','activo','activo']; else if(table==='maestrias') ejemplo=['Maestría Tecnológica en Desarrollo e Innovación Digital en los Negocios','MT-DIDN','activo']; else if(table==='temas') ejemplo=['1720000001','NOMBRE COMPLETO DEL ESTUDIANTE','Modelo de plataforma digital para educación financiera','Innovación y transformación digital','1711111111','1','registrado']; csvDownload('modelo_'+table+'.csv',[headers,ejemplo]); }

window.procesarImportacion = async function(table){
  const fileInput = document.getElementById('xlsFile');
  const file = fileInput && fileInput.files ? fileInput.files[0] : null;
  const result = document.getElementById('importResult');
  const box = document.getElementById('importProgressBox');
  const bar = document.getElementById('importProgressBar');
  const txt = document.getElementById('importProgressText');
  const pct = document.getElementById('importProgressPercent');
  const det = document.getElementById('importProgressDetail');
  const btn = document.getElementById('btnImportarArchivo');

  function setProgress(percent,message,detail){
    const p = Math.max(0,Math.min(100,Math.round(percent||0)));
    if(box) box.style.display='block';
    if(bar) bar.style.width=p+'%';
    if(txt) txt.textContent=message||'Procesando...';
    if(pct) pct.textContent=p+'%';
    if(det) det.textContent=detail||'';
  }

  try{
    if(result) result.innerHTML='';
    if(!file){
      alert('Seleccione un archivo XLS, XLSX o CSV');
      return;
    }
    if(btn){btn.disabled=true;btn.textContent='Procesando...';}
    setProgress(5,'Leyendo archivo','Archivo seleccionado: '+file.name);

    if(!window.XLSX){
      setProgress(100,'No se pudo importar','No se cargó la librería XLSX. Verifique conexión a Internet.');
      if(result) result.innerHTML='<div class="note"><strong>Error:</strong> No se cargó la librería XLSX. Verifique conexión a Internet y vuelva a intentar.</div>';
      return;
    }

    const buf = await file.arrayBuffer();
    setProgress(18,'Interpretando XLS/XLSX','Leyendo la primera hoja del archivo.');
    const wb = XLSX.read(buf,{type:'array'});
    if(!wb.SheetNames || !wb.SheetNames.length) throw new Error('El archivo no tiene hojas para importar.');
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
    if(!rows.length){
      setProgress(100,'Archivo vacío','No se encontraron filas con datos.');
      if(result) result.innerHTML='<div class="note"><strong>Archivo vacío:</strong> no se encontraron filas con datos para importar.</div>';
      return;
    }

    setProgress(25,'Validando datos','Filas encontradas: '+rows.length);
    let ok=0, err=[], omitidas=0, nuevos=0, actualizados=0, sinCambios=0;
    for(const [i,r] of rows.entries()){
      const filaExcel = i+2;
      let row = await prepararFilaImportacion(table, normalizarFilaImportacion(table,r));
      let faltante = '';
      if(table==='estudiantes' && (!row.cedula||!row.nombre)) faltante='faltan CEDULA o NOMBRE';
      if(table==='profesores' && (!row.cedula||!row.nombres||!row.apellidos)) faltante='faltan cedula, nombres o apellidos';
      if(table==='maestrias' && !row.nombre) faltante='falta nombre de maestría';
      if(table==='temas' && (!row.estudiante_id||!row.tema)) faltante='faltan CEDULA_ESTUDIANTE válida o TEMA';
      if(faltante){
        err.push('Fila '+filaExcel+': '+faltante);
        omitidas++;
      }else{
        try{
          const rImport = await upsertImportRow(table,row);
          if(rImport.status==='nuevo'){ nuevos++; ok++; }
          else if(rImport.status==='actualizado'){ actualizados++; ok++; }
          else { sinCambios++; ok++; }
        }catch(e){
          err.push('Fila '+filaExcel+': '+(e.message||e));
        }
      }
      const progress = 25 + ((i+1)/rows.length)*68;
      setProgress(progress,'Importando registros','Procesados '+(i+1)+' de '+rows.length+' | Nuevos: '+nuevos+' | Actualizados: '+actualizados+' | Sin cambios: '+sinCambios+' | Errores: '+err.length);
      await new Promise(resolve=>setTimeout(resolve,0));
    }

    setProgress(96,'Registrando auditoría','Guardando resumen de importación.');
    try{ await audit('importar',table,'Importación XLS/XLSX/CSV. Nuevos: '+nuevos+', actualizados: '+actualizados+', sin cambios: '+sinCambios); }catch(e){}
    setProgress(100,'Importación finalizada','Nuevos: '+nuevos+' | Actualizados: '+actualizados+' | Sin cambios: '+sinCambios+' | Omitidos/errores: '+err.length);
    if(result){
      result.innerHTML=`<div class="note" style="border-left-color:${err.length?'var(--tomate)':'var(--verde)'}">
        <strong>Resultado de importación</strong><br>
        Registros leídos: ${rows.length}<br>
        Registros procesados correctamente: ${ok}<br>
        Nuevos creados: ${nuevos}<br>
        Existentes actualizados: ${actualizados}<br>
        Existentes sin cambios: ${sinCambios}<br>
        Registros omitidos/con error: ${err.length}
      </div>${err.length?'<div class="note"><strong>Detalle de errores:</strong><br>'+err.slice(0,80).join('<br>')+(err.length>80?'<br>...':'')+'</div>':''}
      <div class="toolbar"><button class="btn btn-primary" onclick="location.reload()">Actualizar listado</button></div>`;
    }
  }catch(e){
    console.error(e);
    setProgress(100,'Error en la importación',e.message||String(e));
    if(result) result.innerHTML='<div class="note"><strong>Error:</strong> '+(e.message||e)+'</div>';
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📤 Importar archivo';}
  }
}

async function openProfesor(id=null){
 const data=await all('profesores'); const r=id?data.find(x=>String(x.id)===String(id)):{};
 modal(id?'Editar docente':'Nuevo docente',`<form onsubmit="saveProfesor(event,${id||'null'})"><div class="grid grid-2">
  <div class="form-group"><label>Cédula</label><input id="p_cedula" value="${r.cedula||''}" required></div>
  <div class="form-group"><label>Nombres</label><input id="p_nombres" value="${r.nombres||''}" required></div>
  <div class="form-group"><label>Apellidos</label><input id="p_apellidos" value="${r.apellidos||''}" required></div>
  <div class="form-group"><label>Correo</label><input id="p_correo" value="${r.correo||''}"></div>
  <div class="form-group"><label>Teléfono</label><input id="p_telefono" value="${r.telefono||''}"></div>
  <div class="form-group"><label>Título académico</label><input id="p_tituloe" value="${r.tituloe||''}"></div>
  <div class="form-group"><label>Estado administrativo</label><select id="p_estado"><option ${r.estado==='activo'?'selected':''}>activo</option><option ${r.estado==='inactivo'?'selected':''}>inactivo</option></select></div>
  <div class="form-group"><label>Estado de acceso</label><select id="p_estado_acceso"><option ${r.estado_acceso==='activo'?'selected':''}>activo</option><option ${r.estado_acceso==='pendiente'?'selected':''}>pendiente</option><option ${r.estado_acceso==='inactivo'?'selected':''}>inactivo</option><option ${r.estado_acceso==='bloqueado'?'selected':''}>bloqueado</option></select></div>
 </div><button class="btn btn-primary">Guardar docente</button></form>`);
}
async function saveProfesor(e,id){ e.preventDefault(); const row={cedula:getVal('p_cedula'),nombres:getVal('p_nombres'),apellidos:getVal('p_apellidos'),correo:getVal('p_correo'),telefono:getVal('p_telefono'),tituloe:getVal('p_tituloe'),estado:getVal('p_estado'),estado_acceso:getVal('p_estado_acceso')}; if(id){await update('profesores',id,row); await audit('editar','profesores','Editó docente '+id)}else{await insert('profesores',row); await audit('crear','profesores','Creó docente '+row.cedula)} location.reload(); }
async function toggleProfesor(id,nuevo){ const row={estado:nuevo,estado_acceso:nuevo==='activo'?'activo':'inactivo'}; await update('profesores',id,row); await audit(nuevo==='activo'?'activar':'inactivar','profesores','Cambió estado docente '+id+' a '+nuevo); location.reload(); }
async function openDocenteInvite(id=null){ const data=await all('profesores'); const r=id?data.find(x=>String(x.id)===String(id)):{}; modal('Crear URL de invitación docente',`<form onsubmit="saveDocenteInvite(event,${id||'null'})"><div class="grid grid-2">
  <div class="form-group"><label>Cédula</label><input id="di_cedula" value="${r.cedula||''}" required></div>
  <div class="form-group"><label>Nombres</label><input id="di_nombres" value="${r.nombres||''}" required></div>
  <div class="form-group"><label>Apellidos</label><input id="di_apellidos" value="${r.apellidos||''}" required></div>
  <div class="form-group"><label>Correo</label><input id="di_correo" value="${r.correo||''}"></div>
  <div class="form-group"><label>Teléfono</label><input id="di_telefono" value="${r.telefono||''}"></div>
  <div class="form-group"><label>Título</label><input id="di_tituloe" value="${r.tituloe||''}"></div>
  <div class="form-group"><label>Estado inicial</label><select id="di_estado"><option>pendiente</option><option>activo</option><option>inactivo</option></select></div>
 </div><button class="btn btn-success">Generar invitación docente</button></form>`); }
async function saveDocenteInvite(e,profId=null){ e.preventDefault(); const token='DOC-'+Date.now()+'-'+Math.random().toString(36).slice(2,8).toUpperCase(); const row={token,cedula:getVal('di_cedula'),nombres:getVal('di_nombres'),apellidos:getVal('di_apellidos'),correo:getVal('di_correo'),telefono:getVal('di_telefono'),tituloe:getVal('di_tituloe'),estado:getVal('di_estado'),fecha_creacion:new Date().toISOString()}; await insert('invitaciones_docentes',row); if(profId){ await update('profesores',profId,{estado_acceso:'pendiente',token_invitacion:token,fecha_invitacion:new Date().toISOString()}); } await audit('crear','invitaciones_docentes','Creó invitación docente '+row.cedula); alert('Invitación docente creada. Copie el enlace desde la tabla.'); location.reload(); }
async function removeDocenteInvite(id){ if(confirm('¿Eliminar esta invitación docente?')){ await removeRow('invitaciones_docentes',id); await audit('eliminar','invitaciones_docentes','Eliminó invitación '+id); location.reload(); } }
function copiarTexto(t){ navigator.clipboard?.writeText(t); alert('URL copiada'); }
renderProfesores();


</script></body></html>
