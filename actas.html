function loadLocal(){let d=localStorage.getItem('defensasDemoDB'); if(!d){localStorage.setItem('defensasDemoDB',JSON.stringify(seed)); return JSON.parse(JSON.stringify(seed));} return JSON.parse(d)}
function saveLocal(d){localStorage.setItem('defensasDemoDB',JSON.stringify(d))}
async function all(table){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).select('*').order('id',{ascending:true}); if(error) throw error; return data||[];} return loadLocal()[table]||[]; }
async function insert(table,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).insert(row).select().single(); if(error) throw error; return data;} const d=loadLocal(); const arr=d[table]||[]; const id=arr.length?Math.max(...arr.map(x=>Number(x.id)||0))+1:1; const rec={id,...row}; arr.push(rec); d[table]=arr; saveLocal(d); return rec; }
async function update(table,id,row){ if(supabaseClient){ const {data,error}=await supabaseClient.from(table).update(row).eq('id',id).select().single(); if(error) throw error; return data;} const d=loadLocal(); d[table]=(d[table]||[]).map(x=>String(x.id)===String(id)?{...x,...row}:x); saveLocal(d); return row; }

window.openCrud=async function(table,id=null){ const cfg=window.__crud; const row=id?cfg.data.find(x=>String(x.id)===String(id)):{}; const html=`<form onsubmit="saveCrud(event,'${table}',${id||'null'})"><div class="grid grid-2">${cfg.fields.map(f=>`<div class="form-group"><label>${f.label}</label>${f.type==='textarea'?`<textarea id="f_${f.key}">${row[f.key]||''}</textarea>`:`<input id="f_${f.key}" type="${f.type||'text'}" value="${row[f.key]||''}">`}</div>`).join('')}</div><button class="btn btn-primary">Guardar</button></form>`; modal(id?'Editar registro':'Nuevo registro',html); }

const MODELOS_IMPORTACION={
 estudiantes:['CEDULA','NOMBRE','CORREO_INSTITUCIONAL','CORREO_PERSONAL','CELULAR','WHATSAPP','CARRERA','NIVEL','TIPO','PERIODO'],
 profesores:['cedula','nombres','apellidos','correo','telefono','tituloe','estado','estado_acceso'],
 maestrias:['nombre','codigo','estado']
};
function getImportValue(r,key){
 const variantes=[key,key.toUpperCase(),key.toLowerCase(),key.replaceAll('_',' '),key.toUpperCase().replaceAll('_',' ')];
 for(const k of variantes){ if(r[k]!==undefined && r[k]!==null) return String(r[k]).trim(); }
 return '';
}
function normalizarFilaImportacion(table,r){
 if(table==='estudiantes'){
   const cedula=getImportValue(r,'CEDULA');
   const nombre=getImportValue(r,'NOMBRE');
   const correoInst=getImportValue(r,'CORREO_INSTITUCIONAL');
   const correoPersonal=getImportValue(r,'CORREO_PERSONAL');
   const celular=getImportValue(r,'CELULAR');
   const whatsapp=getImportValue(r,'WHATSAPP');
   const carrera=getImportValue(r,'CARRERA');
   const nivel=getImportValue(r,'NIVEL');
   const tipo=getImportValue(r,'TIPO');
   const periodo=getImportValue(r,'PERIODO');
   return {cedula,nombre,nombres:nombre,apellidos:'',correo:correoInst,correo_institucional:correoInst,correo_personal:correoPersonal,celular,whatsapp,telefono:whatsapp||celular,carrera,nivel,tipo,periodo,programa:carrera,cohorte:nivel,estado:'activo'};
 }
 if(table==='profesores'){
   return {cedula:getImportValue(r,'cedula'),nombres:getImportValue(r,'nombres'),apellidos:getImportValue(r,'apellidos'),correo:getImportValue(r,'correo'),telefono:getImportValue(r,'telefono'),tituloe:getImportValue(r,'tituloe'),estado:getImportValue(r,'estado')||'activo',estado_acceso:getImportValue(r,'estado_acceso')||'activo'};
 }
 if(table==='maestrias'){
   return {nombre:getImportValue(r,'nombre'),codigo:getImportValue(r,'codigo'),estado:getImportValue(r,'estado')||'activo'};
 }
 return r;
}
function descargarModelo(table){ const headers=MODELOS_IMPORTACION[table]||[]; let ejemplo=[]; if(table==='estudiantes') ejemplo=['1720000001','NOMBRE COMPLETO DEL ESTUDIANTE','estudiante@cordillera.edu.ec','personal@gmail.com','0999999999','0999999999','MAESTRIA TECNOLOGICA EN DESARROLLO E INNOVACION DIGITAL EN LOS NEGOCIOS','I','NUEVO','2026-2026']; else if(table==='profesores') ejemplo=['1711111111','NOMBRES','APELLIDOS','docente@cordillera.edu.ec','0999999999','Mgtr.','activo','activo']; else if(table==='maestrias') ejemplo=['Maestría Tecnológica en Desarrollo e Innovación Digital en los Negocios','MT-DIDN','activo']; csvDownload('modelo_'+table+'.csv',[headers,ejemplo]); }
window.openImportModal = function(table){
  const headers = MODELOS_IMPORTACION[table] || [];
  modal('Importar '+table+' desde XLS/XLSX',`
    <div class="note"><strong>Formato requerido:</strong> el archivo debe tener encabezados: ${headers.join(', ')}. También puede usar el botón Descargar modelo.</div>
    <input type="file" id="xlsFile" accept=".xlsx,.xls,.csv">

    </div>
    <div id="importProgressBox" style="display:none;margin-top:14px;border:1px solid var(--borde);border-radius:12px;padding:12px;background:#f8fffc">
      <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;font-weight:700;color:var(--verde-oscuro)">
        <span id="importProgressText">Preparando importación...</span>

      </div>
      <div style="height:14px;background:#e5eeee;border-radius:999px;overflow:hidden">
        <div id="importProgressBar" style="height:14px;width:0%;background:linear-gradient(90deg,var(--verde-oscuro),var(--verde));transition:width .2s"></div>
      </div>
      <div id="importProgressDetail" class="muted" style="margin-top:8px">Esperando archivo.</div>
    </div>
    <div id="importResult" class="muted" style="margin-top:12px"></div>
  `);
}
window.procesarImportacion = async function(table){
  const fileInput = document.getElementById('xlsFile');
  const file = fileInput && fileInput.files ? fileInput.files[0] : null;
  const result = document.getElementById('importResult');
  const box = document.getElementById('importProgressBox');
  const bar = document.getElementById('importProgressBar');
  const txt = document.getElementById('importProgressText');
  const pct = document.getElementById('importProgressPercent');
  const det = document.getElementById('importProgressDetail');
  const btn = document.getElementById('btnImportarArchivo');

  function setProgress(percent,message,detail){
    const p = Math.max(0,Math.min(100,Math.round(percent||0)));
    if(box) box.style.display='block';
    if(bar) bar.style.width=p+'%';
    if(txt) txt.textContent=message||'Procesando...';
    if(pct) pct.textContent=p+'%';
    if(det) det.textContent=detail||'';
  }

  try{
    if(result) result.innerHTML='';
    if(!file){
      alert('Seleccione un archivo XLS, XLSX o CSV');
      return;
    }
    if(btn){btn.disabled=true;btn.textContent='Procesando...';}
    setProgress(5,'Leyendo archivo','Archivo seleccionado: '+file.name);

    if(!window.XLSX){
      setProgress(100,'No se pudo importar','No se cargó la librería XLSX. Verifique conexión a Internet.');
      if(result) result.innerHTML='<div class="note"><strong>Error:</strong> No se cargó la librería XLSX. Verifique conexión a Internet y vuelva a intentar.</div>';
      return;
    }

    const buf = await file.arrayBuffer();
    setProgress(18,'Interpretando XLS/XLSX','Leyendo la primera hoja del archivo.');
    const wb = XLSX.read(buf,{type:'array'});
    if(!wb.SheetNames || !wb.SheetNames.length) throw new Error('El archivo no tiene hojas para importar.');
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
    if(!rows.length){
      setProgress(100,'Archivo vacío','No se encontraron filas con datos.');
      if(result) result.innerHTML='<div class="note"><strong>Archivo vacío:</strong> no se encontraron filas con datos para importar.</div>';
      return;
    }

    setProgress(25,'Validando datos','Filas encontradas: '+rows.length);
    let ok=0, err=[], omitidas=0;
    for(const [i,r] of rows.entries()){
      const filaExcel = i+2;
      let row = normalizarFilaImportacion(table,r);
      let faltante = '';
      if(table==='estudiantes' && (!row.cedula||!row.nombre)) faltante='faltan CEDULA o NOMBRE';
      if(table==='profesores' && (!row.cedula||!row.nombres||!row.apellidos)) faltante='faltan cedula, nombres o apellidos';
      if(table==='maestrias' && !row.nombre) faltante='falta nombre de maestría';
      if(faltante){
        err.push('Fila '+filaExcel+': '+faltante);
        omitidas++;
      }else{
        try{
          await insert(table,row);
          ok++;
        }catch(e){
          err.push('Fila '+filaExcel+': '+(e.message||e));
        }
      }
      const progress = 25 + ((i+1)/rows.length)*68;
      setProgress(progress,'Importando registros','Procesados '+(i+1)+' de '+rows.length+' | Correctos: '+ok+' | Errores: '+err.length);
      await new Promise(resolve=>setTimeout(resolve,0));
    }

    setProgress(96,'Registrando auditoría','Guardando resumen de importación.');
    try{ await audit('importar',table,'Importados '+ok+' registros desde XLS/XLSX/CSV'); }catch(e){}
    setProgress(100,'Importación finalizada','Correctos: '+ok+' | Omitidos/errores: '+err.length);
    if(result){
      result.innerHTML=`<div class="note" style="border-left-color:${err.length?'var(--tomate)':'var(--verde)'}">
        <strong>Resultado de importación</strong><br>
        Registros leídos: ${rows.length}<br>
        Registros importados: ${ok}<br>
        Registros omitidos/con error: ${err.length}
      </div>${err.length?'<div class="note"><strong>Detalle de errores:</strong><br>'+err.slice(0,80).join('<br>')+(err.length>80?'<br>...':'')+'</div>':''}
      <div class="toolbar"><button class="btn btn-primary" onclick="location.reload()">Actualizar listado</button></div>`;
    }
  }catch(e){
    console.error(e);
    setProgress(100,'Error en la importación',e.message||String(e));
    if(result) result.innerHTML='<div class="note"><strong>Error:</strong> '+(e.message||e)+'</div>';
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📤 Importar archivo';}
  }
}

function fechaLarga(fecha){if(!fecha)return '';const d=new Date(fecha+'T00:00:00');return d.toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})}
function buildActa({d,e,t,tribunal,obs}){const rubrica=getRubrica();const nota=Number(d.nota_final||0);const estado=nota>=7?'APROBACIÓN':'REPROBACIÓN';return `${actaCss()}<div class="acta-page page-break"><div class="acta-top"><img src="${LOGO_URL}"></div><h2 class="acta-title">EVALUACIÓN DE LA MODALIDAD DE TRABAJO PRÁCTICO</h2><table class="acta-table"><tr><th colspan="4" style="text-align:left">Datos del estudiante</th></tr><tr><td class="acta-label">Apellidos</td><td colspan="3">${e.apellidos||''}</td></tr><tr><td class="acta-label">Nombres</td><td colspan="3">${e.nombres||''}</td></tr><tr><td class="acta-label">Programa</td><td colspan="3">${e.programa||''}</td></tr><tr><td class="acta-label">Fecha</td><td>${fechaLarga(d.fecha_defensa)}</td><td>No.</td><td>${d.id}</td></tr><tr><th colspan="4" style="text-align:left">Tema TFMT</th></tr><tr><td colspan="4">${t.tema||''}</td></tr></table><h3 style="color:#006068">Rúbrica de evaluación</h3><ul class="acta-small"><li>No aceptable/no presentado (0 cero)</li><li>Malo / insuficiente (1)</li><li>Deficiente (2)</li><li>Regular (3)</li><li>Bueno (4)</li><li>Excelente/sobresaliente (5)</li></ul>${renderRubricaTabla(rubrica)}<div class="acta-footer">Quito - Ecuador<br>www.cordillera.edu.ec<br>© 2024 Instituto Tecnológico Superior Cordillera - Todos los derechos reservados.<br>Página 1 de 3</div><div class="acta-orange"></div></div><div class="acta-page page-break"><div class="acta-top"><img src="${LOGO_URL}"></div>${renderEvaluacionFinal(rubrica,nota)}<br><table class="acta-table"><tr><th>OBSERVACIONES Y RECOMENDACIONES</th></tr><tr><td style="height:70px">${obs||''}</td></tr></table><br><table class="acta-table"><tr><th colspan="3">TRIBUNAL<br><span class="acta-small">FIRMA DE TRIBUNAL</span></th></tr><tr><td class="firma-box"></td><td class="firma-box"></td><td class="firma-box"></td></tr><tr><th>PRESIDENTE</th><th>TRIBUNAL 1</th><th>TRIBUNAL 2</th></tr><tr><td style="text-align:center">${tribunal.presidente}</td><td style="text-align:center">${tribunal.vocal1}</td><td style="text-align:center">${tribunal.vocal2}</td></tr><tr><td class="acta-small" style="text-align:center">Nombres y apellidos</td><td class="acta-small" style="text-align:center">Nombres y apellidos</td><td class="acta-small" style="text-align:center">Nombres y apellidos</td></tr></table><br><table class="acta-table"><tr><th>VALIDACIÓN SECRETARÍA</th><td style="text-align:center">${d.fecha_defensa||''}</td><td></td></tr><tr><td></td><td class="acta-small" style="text-align:center">Fecha</td><td class="acta-small" style="text-align:center">Firma responsable</td></tr></table><div class="acta-footer">Quito - Ecuador<br>www.cordillera.edu.ec<br>© 2024 Instituto Tecnológico Superior Cordillera - Todos los derechos reservados.<br>Página 2 de 3</div><div class="acta-orange"></div></div><div class="acta-page"><div class="acta-top"><img src="${LOGO_URL}"></div><h2 class="acta-title">ACTA DE DISERTACIÓN DE TFMT</h2><p class="acta-p">En la ciudad de Quito D.M., a los ${new Date((d.fecha_defensa||'2026-01-01')+'T00:00:00').getDate()} días del mes de ${new Date((d.fecha_defensa||'2026-01-01')+'T00:00:00').toLocaleDateString('es-EC',{month:'long'})} de ${new Date((d.fecha_defensa||'2026-01-01')+'T00:00:00').getFullYear()}, habiendo cumplido todos los requisitos en el programa de ${e.programa||''} del Instituto Superior Tecnológico Cordillera, se ha presentado a la disertación oral del Trabajo de Fin de Master Tecnológico el estudiante <strong>${(e.apellidos||'')+' '+(e.nombres||'')}</strong> con cédula ${e.cedula||''}.</p><p>En esta disertación el estudiante ha obtenido las siguientes valoraciones:</p>${renderEvaluacionFinal(rubrica,nota)}<p class="acta-p">Por lo tanto, ha obtenido una nota válida para declarar la <strong>${estado}</strong> del programa de ${e.programa||''}. Cumpliendo así los requisitos académicos correspondientes.</p><p>Certifican el cumplimiento de lo actuado en el presente tribunal;</p><table class="acta-table"><tr><th colspan="3">TRIBUNAL<br><span class="acta-small">FIRMA DE TRIBUNAL</span></th></tr><tr><td class="firma-box"></td><td class="firma-box"></td><td class="firma-box"></td></tr><tr><th>PRESIDENTE</th><th>TRIBUNAL 1</th><th>TRIBUNAL 2</th></tr><tr><td style="text-align:center">${tribunal.presidente}</td><td style="text-align:center">${tribunal.vocal1}</td><td style="text-align:center">${tribunal.vocal2}</td></tr></table><br><table class="acta-table"><tr><th>VALIDACIÓN SECRETARÍA</th><td style="text-align:center">${d.fecha_defensa||''}</td><td></td></tr></table><div class="acta-footer">Quito - Ecuador<br>www.cordillera.edu.ec<br>© 2024 Instituto Tecnológico Superior Cordillera - Todos los derechos reservados.<br>Página 3 de 3</div><div class="acta-orange"></div></div>`}
(async()=>{if(!requireAdmin())return;const {est,prof,tem,def,jur,cal}=await lookup();function estudiante(id){return est.find(x=>String(x.id)===String(id))||{}}function tema(id){return tem.find(x=>String(x.id)===String(id))||{}}function profesor(id){return prof.find(x=>String(x.id)===String(id))||{}}const finalizadas=def.filter(d=>d.estado==='finalizada');app.innerHTML=`<div class="card"><div class="toolbar"><button class="btn btn-primary" onclick="editarRubrica()">🧩 Editar puntos/rúbrica</button><button class="btn btn-outline" onclick="resetRubrica()">Restaurar rúbrica base</button></div><p class="muted">El acta se genera con el formato del modelo adjunto de 3 páginas: evaluación, observaciones/tribunal y acta de disertación.</p><div class="table-wrap"><table><thead><tr><th>Estudiante</th><th>Tema</th><th>Nota final</th><th>Estado</th><th>Acción</th></tr></thead><tbody>${finalizadas.map(d=>{let e=estudiante(d.estudiante_id),t=tema(d.tema_id);return `<tr><td>${e.nombres} ${e.apellidos}</td><td>${t.tema}</td><td>${money(d.nota_final)}</td><td>${badge(d.estado_final,d.estado_final==='aprobado'?'ok':'err')}</td><td><button class="btn btn-primary" onclick="verActa(${d.id})">📄 Ver/Imprimir</button></td></tr>`}).join('')||'<tr><td colspan="5">No existen defensas finalizadas.</td></tr>'}</tbody></table></div></div>`;
window.editarRubrica=function(){const rub=getRubrica();modal('Editar puntos de rúbrica',`<div id="rubricaEdit">${rub.map((c,ci)=>`<div class="card"><div class="toolbar"><input id="cat_${ci}" value="${c.categoria}"><input id="peso_${ci}" type="number" value="${c.peso}" style="max-width:90px"><button class="btn btn-danger" onclick="delCat(${ci})">Eliminar categoría</button></div><div id="inds_${ci}">${c.indicadores.map((ind,ii)=>`<div class="toolbar"><input id="ind_${ci}_${ii}" value="${ind}"><button class="btn btn-danger" onclick="delInd(${ci},${ii})">Eliminar</button></div>`).join('')}</div><button class="btn btn-outline" onclick="addInd(${ci})">Agregar indicador</button></div>`).join('')}</div><div class="toolbar"><button class="btn btn-success" onclick="addCat()">Agregar categoría</button><button class="btn btn-primary" onclick="guardarRubricaEdit()">Guardar cambios</button></div>`)};
window.guardarRubricaEdit=function(){const rub=getRubrica().map((c,ci)=>({categoria:document.getElementById('cat_'+ci)?.value||c.categoria,peso:Number(document.getElementById('peso_'+ci)?.value||c.peso),indicadores:c.indicadores.map((ind,ii)=>document.getElementById(`ind_${ci}_${ii}`)?.value||ind)}));saveRubrica(rub);location.reload()};
window.delCat=function(i){let r=getRubrica();r.splice(i,1);saveRubrica(r);editarRubrica()};window.delInd=function(ci,ii){let r=getRubrica();r[ci].indicadores.splice(ii,1);saveRubrica(r);editarRubrica()};window.addInd=function(ci){let r=getRubrica();r[ci].indicadores.push('Nuevo indicador editable');saveRubrica(r);editarRubrica()};window.addCat=function(){let r=getRubrica();r.push({categoria:'NUEVA CATEGORÍA - 0%',peso:0,indicadores:['Nuevo indicador']});saveRubrica(r);editarRubrica()};window.resetRubrica=function(){if(confirm('Restaurar rúbrica base?')){localStorage.removeItem('rubricaActaCordillera');location.reload()}};
window.verActa=function(id){const d=def.find(x=>String(x.id)===String(id));const e=estudiante(d.estudiante_id);const t=tema(d.tema_id);const js=jur.filter(x=>String(x.defensa_id)===String(id));const getP=rol=>{let j=js.find(x=>x.rol_jurado===rol);let p=j?profesor(j.profesor_id):{};return `${p.tituloe||''} ${p.nombres||''} ${p.apellidos||''}`.trim()};const obs=cal.filter(x=>String(x.defensa_id)===String(id)).map(x=>`${x.rol_jurado}: ${x.observacion}`).join('<br>');const html=buildActa({d,e,t,tribunal:{presidente:getP('presidente'),vocal1:getP('vocal1'),vocal2:getP('vocal2')},obs});modal('Acta institucional',`<div class="toolbar no-print"><button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / PDF</button><button class="btn btn-success" onclick="notificar(${id})">📨 Notificar estudiante</button></div>${html}`)};
window.notificar=function(id){const d=def.find(x=>String(x.id)===String(id));const e=estudiante(d.estudiante_id);const t=tema(d.tema_id);const msg=encodeURIComponent(`Estimado/a ${e.nombres} ${e.apellidos}, le informamos que su defensa del tema "${t.tema}" finalizo. Nota final: ${money(d.nota_final)}/10. Resultado: ${d.estado_final}. Instituto Tecnologico Universitario Cordillera.`);modal('Notificar resultado',`<div class="grid grid-3"><a class="btn btn-primary" href="mailto:${e.correo}?subject=Resultado de defensa&body=${msg}">Correo</a><a class="btn btn-success" target="_blank" href="https://wa.me/593${String(e.telefono||'').replace(/^0/,'')}?text=${msg}">WhatsApp</a><a class="btn btn-outline" target="_blank" href="https://teams.microsoft.com/l/chat/0/0?users=${e.teams||e.correo}">Teams</a></div>`)};
})();
</script></body></html>
